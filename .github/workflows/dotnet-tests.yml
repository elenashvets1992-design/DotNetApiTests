name: .NET API Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore ApiTests.sln

      - name: Build solution
        run: dotnet build ApiTests.sln --no-restore

      - name: Run tests
        run: dotnet test ApiTests.sln --no-build --verbosity normal